<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gastos Operativos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">
  <div class="app">
    <header>
      <h1>Gastos Operativos</h1>
      <p>Control diario y semanal</p>
    </header>

    <section class="card">
      <label>Nombre del operador</label>
      <select id="operador">
        <option value="">Selecciona operador</option>
        <option>Saúl Galván</option>
        <option>Juan Pérez</option>
        <option>Carlos López</option>
        <option>Mario Hernández</option>
      </select>

      <label>Tipo de gasto</label>

      <div class="tipo-grid">
        <button type="button" class="tipo-btn" data-tipo="Gas">⛽ Gas</button>
        <button type="button" class="tipo-btn" data-tipo="Diésel">🛢️ Diésel</button>
        <button type="button" class="tipo-btn" data-tipo="Comida">🍽️ Comida</button>
        <button type="button" class="tipo-btn" data-tipo="Otros">📌 Otro</button>
      </div>

      <input id="otroGasto" class="hidden" placeholder="Escribe el gasto">

      <label>Cantidad</label>
      <input type="number" id="cantidad" placeholder="$0.00">

      <button type="button" id="guardarBtn" class="guardar">Guardar gasto</button>
    </section>

    <section class="resumen">
      <div>
        <h3>Hoy</h3>
        <p id="totalDiario">$0</p>
      </div>
      <div>
        <h3>Semana</h3>
        <p id="totalSemanal">$0</p>
      </div>
    </section>

    <section class="reportes">
      <button type="button" onclick="mandarWhatsApp('dia')">WhatsApp día</button>
      <button type="button" onclick="mandarWhatsApp('semana')">WhatsApp semana</button>
      <button type="button" onclick="generarExcel()">Generar Excel</button>
      <button type="button" onclick="generarWord()">Generar Word</button>
    </section>
  </div>

  <section class="historial">
    <h2>Historial</h2>
    <div id="listaGastos"></div>
  </section>
</div>

<script src="script.js"></script>
</body>
</html>
