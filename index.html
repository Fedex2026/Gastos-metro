<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gastos Operativos</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">
  <header>
    <h1>Gastos Operativos</h1>
    <p>Control diario y semanal de operadores</p>
  </header>

  <section class="card">
    <label>Nombre del operador</label>
    <select id="operador">
      <option value="">Selecciona operador</option>
      <option>Saúl Galván</option>
      <option>Juan Pérez</option>
      <option>Carlos López</option>
      <option>Mario Hernández</option>
    </select>

    <label>Tipo de gasto</label>
    <div class="gastos-grid">
      <button class="tipo-btn" data-tipo="Gas">⛽<span>Gas</span></button>
      <button class="tipo-btn" data-tipo="Diésel">🛢️<span>Diésel</span></button>
      <button class="tipo-btn" data-tipo="Comida">🍽️<span>Comida</span></button>
      <button class="tipo-btn" data-tipo="Otros">📌<span>Otro</span></button>
    </div>

    <input id="otroGasto" class="hidden" placeholder="Escribe el tipo de gasto" />

    <label>Cantidad</label>
    <input type="number" id="cantidad" placeholder="$0.00" />

    <button id="guardarBtn" class="guardar">Guardar gasto</button>
  </section>

  <section class="resumen">
    <div>
      <h3>Hoy</h3>
      <p id="totalDiario">$0</p>
    </div>
    <div>
      <h3>Semana</h3>
      <p id="totalSemanal">$0</p>
    </div>
  </section>

  <section class="acciones-reporte">
    <button onclick="mandarWhatsApp('dia')">WhatsApp día</button>
    <button onclick="mandarWhatsApp('semana')">WhatsApp semana</button>
    <button onclick="generarExcel()">Excel</button>
    <button onclick="generarWord()">Word</button>
  </section>

  <section class="historial">
    <h2>Historial</h2>
    <div id="listaGastos"></div>
  </section>
</div>

<script src="script.js"></script>
</body>
</html>
